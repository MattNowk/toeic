<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat-quizz TOEIC 🎮 🐾</title>
    
    <link rel="stylesheet" href="../css/styles.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>🎮 Chat-Quizz TOEIC 😻</h1>
        <p>Trouve la bonne traduction pour gagner des croquettes !</p>
        <br>
        <a href="../index.html" class="quiz-link">🐾 Retour au dictionnaire</a>
    </header>

    <main>
    <section class="quiz-section">
        <div class="grid" style="display: flex; justify-content: center;">
            
            <div class="card quiz-container" style="max-width: 600px; width: 100%; margin-top: 2rem;">
                <div class="cat-icon" id="quiz-cat">🎮</div>
                
                <div id="quiz-content">
                    <p style="text-transform: uppercase; letter-spacing: 1px; color: #666; font-weight: bold; font-size: 0.8rem;">Traduisez le mot :</p>
                    <div class="question-word" id="target-word">Requirement</div>
                    
                    <div class="options-grid" id="options-container">
                        </div>
                    
                    <div id="feedback" class="feedback"></div>
                    
                    <div class="score-board">
                        <span>Score actuel</span>
                        <div style="font-size: 2rem;" id="score">0 🐾</div>
                    </div>
                </div>
            </div>
            
        </div>
    </section>
</main>

    <footer>
        <p>Entraîne-toi tous les jours pour obtenir ton 🐾 TOEIC !</p>
    </footer>

    <script src="../js/quiz.js"></script>
</body>
</html>
