<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat-quizz TOEIC 🐾</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Styles spécifiques au quiz */
        .quiz-container {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            max-width: 600px;
            width: 90%;
            text-align: center;
            margin-top: 2rem;
        }
        .question-word {
            font-size: 2.5rem;
            color: #ff4d94;
            font-weight: 900;
            margin-bottom: 1.5rem;
        }
        .options-grid {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .option-btn {
            background: #fff0f5;
            border: 2px solid #ffb3d9;
            padding: 1rem;
            border-radius: 15px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background: #ffb3d9;
            transform: scale(1.02);
        }
        .score-board {
            margin-top: 2rem;
            font-weight: bold;
            color: #ff3385;
        }
        .feedback {
            height: 2rem;
            margin-top: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 Chat-Quizz TOEIC 😻</h1>
        <p>Trouve la bonne traduction pour gagner des croquettes !</p>
        <a href="index.html" style="text-decoration: none; color: #ff4d94; font-weight: bold;">🐾 Retour au dictionnaire</a>
    </header>

    <main>
        <div class="quiz-container">
            <div id="quiz-content">
                <div class="cat-icon" style="position: relative; top: 0; right: 0; font-size: 3rem;">😽</div>
                <div class="question-word" id="target-word">---</div>
                <div class="options-grid" id="options-container">
                    </div>
                <div id="feedback" class="feedback"></div>
                <div class="score-board">Score : <span id="score">0</span> 🐾</div>
            </div>
        </div>
    </main>

    <script src="js/quiz.js"></script>
</body>
</html>
